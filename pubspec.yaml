name: bharosa_real_estate
description: Bharosa Real Estate - A complete Flutter real estate application with Firebase integration.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.4
  cloud_firestore: ^4.15.5
  firebase_storage: ^11.6.10

  # State Management
  provider: ^6.1.2

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.0
  smooth_page_indicator: ^1.1.0

  # Media
  image_picker: ^1.0.7

  # Location
  geolocator: ^11.0.0
  geocoding: ^3.0.0

  # Notifications
  awesome_notifications: ^0.9.3+1

  # Payments
  razorpay_flutter: ^1.3.6

  # Utilities
  intl: ^0.19.0
  flutter_rating_bar: ^4.0.1
  url_launcher: ^6.2.6
  share_plus: ^9.0.0
  connectivity_plus: ^6.0.3
  shared_preferences: ^2.2.3
  uuid: ^4.4.0

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
